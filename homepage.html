<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - InternMatch</title>
    <link rel="stylesheet" href="./assets/css/tailwind.css" />

  </head>
  <body class="min-h-screen bg-tertiary-50 font-sans text-secondary-700">
    <div class="container mx-auto px-4 sm:px-6 lg:px-8">
    <!-- Dashboard Navbar -->
    <nav class="dashboard-nav">
      <div class="navbar-container mx-auto">
        <!-- Logo & Title -->
        <div class="navbar-logo">
          <div class="logo-icon">IM</div>
          <h1 class="logo-text">InternMatch</h1>
        </div>

        <!-- Search Bar (Desktop) -->
        <div class="search-container">
          <div class="search-wrapper">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.35-4.35" />
            </svg>
            <input
              type="text"
              placeholder="Search internships..."
              class="search-input ui-input"
            />
          </div>
        </div>

        <!-- Right Actions -->
        <div class="navbar-actions">
          <!-- Notifications -->
          <button class="icon-btn notification-btn" aria-label="Notifications">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
            <span class="notification-badge"></span>
          </button>

          <!-- Messages -->
          <button class="icon-btn" aria-label="Messages">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
            </svg>
          </button>

          <!-- Settings -->
          <button class="icon-btn" aria-label="Settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="12" cy="12" r="1" />
              <circle cx="19" cy="12" r="1" />
              <circle cx="5" cy="12" r="1" />
            </svg>
          </button>

          <!-- User Profile Dropdown -->
          <div class="profile-dropdown">
            <button class="profile-btn js-profile-btn" aria-label="User menu" aria-expanded="false">
              <div class="profile-info">
                <div class="profile-text">
                  <p class="profile-name">Alex Dev</p>
                  <p class="profile-role">Student</p>
                </div>
              </div>
              <div class="profile-avatar">AD</div>
              <svg class="dropdown-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <polyline points="6 9 12 15 18 9" />
              </svg>
            </button>

            <!-- Profile Dropdown Menu -->
            <div class="dropdown-menu js-dropdown-menu">
              <div class="dropdown-content">
                <a href="#" class="dropdown-link">My Profile</a>
                <a href="#" class="dropdown-link">Settings</a>
                <a href="#" class="dropdown-link">Help & Support</a>
                <div class="dropdown-divider"></div>
                <a href="/" class="dropdown-link logout">Sign Out</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <main class="dashboard-layout">
      <aside class="dashboard-sidebar" aria-label="Dashboard sidebar">
        <section class="sidebar-section sidebar-profile-card">
          <div class="sidebar-avatar-lg">JD</div>
          <p class="sidebar-user-line">👤 John Doe</p>
          <p class="sidebar-strength">Profile Strength: 80%</p>
          <button class="sidebar-cta-btn ui-btn ui-btn-primary ui-btn-block" type="button">Complete Profile</button>
        </section>

        <section class="sidebar-section sidebar-links" aria-label="Primary links">
          <a href="#" class="sidebar-link">🎯 Matches</a>
          <a href="#" class="sidebar-link">🔖 Saved</a>
          <a href="#" class="sidebar-link">📄 Applications</a>
        </section>

        <section class="sidebar-section">
          <a href="#" class="sidebar-action-link">🚀 Post / Apply</a>
        </section>

        <section class="sidebar-section sidebar-mini-profile">
          <span class="sidebar-avatar-sm">JD</span>
          <span>👤 Profile</span>
        </section>
      </aside>

      <section class="dashboard-content" aria-label="Dashboard content area">
        <div class="dashboard-content-card">
          <h2>Welcome back, John</h2>
          <p>Your dashboard content can go here.</p>
        </div>
      </section>
    </main>

    <script>
      // Profile dropdown toggle
      const profileBtn = document.querySelector('.js-profile-btn');
      const dropdownMenu = document.querySelector('.js-dropdown-menu');

      if (profileBtn && dropdownMenu) {
        profileBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          profileBtn.classList.toggle('is-open');
          dropdownMenu.classList.toggle('is-open');
          profileBtn.setAttribute('aria-expanded', profileBtn.classList.contains('is-open'));
        });

        document.addEventListener('click', () => {
          profileBtn.classList.remove('is-open');
          dropdownMenu.classList.remove('is-open');
          profileBtn.setAttribute('aria-expanded', 'false');
        });

        dropdownMenu.addEventListener('click', (e) => {
          e.stopPropagation();
        });
      }
    </script>
    </div>
  </body>
</html>
