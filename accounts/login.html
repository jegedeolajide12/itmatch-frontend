<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Itmatch - Login</title>
    <link rel="stylesheet" href="../assets/css/tailwind.css" />

  </head>
  <body class="auth-page m-0 font-sans text-base leading-relaxed tracking-normal text-secondary-700 antialiased">
    <div class="auth-grid">
      <section class="auth-hero" style="background-image: url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=1200&q=80');">
        <div class="auth-hero-content">
          <a href="../templates/home.html" class="auth-brand">ITMATCH</a>
          <div class="max-w-md space-y-6">
            <h1 class="auth-hero-title">Welcome Back to ITMATCH</h1>
            <p class="auth-hero-copy">
              Log in to continue matching with the right internship opportunities faster.
            </p>
          </div>
        </div>
      </section>

      <section class="auth-panel">
        <div class="auth-card">
          <form id="login-form" class="auth-form" novalidate>
            <div>
              <h2 class="auth-title">Log in to your account</h2>
            </div>

            <div class="auth-form-group">
                <input
                  id="email"
                  name="email"
                  type="email"
                  placeholder="Email"
                  class="ui-input"
                />

                <div class="relative">
                  <input
                    id="password"
                    name="password"
                    type="password"
                    placeholder="Password"
                    class="ui-input auth-password pr-12"
                  />
                  <button
                    type="button"
                    class="password-toggle ui-icon-btn absolute right-3 top-1/2 -translate-y-1/2"
                    data-target="password"
                    aria-label="Show password"
                    aria-pressed="false"
                  >
                    <svg class="h-5 w-5 eye-icon eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                    <svg class="hidden h-5 w-5 eye-icon eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M3 3l18 18" />
                      <path d="M10.58 10.58A3 3 0 0 0 12 15a3 3 0 0 0 2.42-4.42" />
                      <path d="M9.88 5.08A9.77 9.77 0 0 1 12 5c6.5 0 10 7 10 7a17.7 17.7 0 0 1-3.4 4.37" />
                      <path d="M6.61 6.61C3.76 8.68 2 12 2 12s3.5 7 10 7a9.77 9.77 0 0 0 4.44-1.06" />
                    </svg>
                  </button>
                </div>
            </div>

            <div class="auth-form-group">
              <button
                id="submit-button"
                type="submit"
                disabled
                class="ui-btn ui-btn-primary ui-btn-block ui-btn-lg"
              >
                Log In
              </button>

              <div class="auth-form-group">
                <p class="auth-divider">Or sign in with</p>
                <div class="auth-social-grid">
                  <button type="button" class="ui-btn ui-btn-secondary auth-social-btn" aria-label="Sign in with Google">
                    <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M21 12a9 9 0 1 1-2.64-6.36" />
                      <path d="M21 12h-9" />
                    </svg>
                    <span>Google</span>
                  </button>

                  <button type="button" class="ui-btn ui-btn-secondary auth-social-btn" aria-label="Sign in with Facebook">
                    <svg class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                      <path d="M14 8h3V4h-3c-2.8 0-5 2.2-5 5v3H6v4h3v4h4v-4h3l1-4h-4V9c0-.6.4-1 1-1z" />
                    </svg>
                    <span>Facebook</span>
                  </button>

                  <button type="button" class="ui-btn ui-btn-secondary auth-social-btn" aria-label="Sign in with X">
                    <svg class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                      <path d="M4 4h4.3l4 5.7L17.3 4H20l-6.4 7.4L20.4 20h-4.3l-4.3-6.1L6.5 20H4l6.8-7.8L4 4z" />
                    </svg>
                    <span>X</span>
                  </button>
                </div>
              </div>

              <p class="auth-footnote">
                Don&#39;t have an account?
                <a href="./signup.html">Sign up</a>
              </p>
            </div>
          </form>
        </div>
      </section>
    </div>

    <script type="module" src="../assets/js/login.js"></script>
  </body>
</html>
