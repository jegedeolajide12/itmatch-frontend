<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Itmatch - Sign Out</title>
    <link rel="stylesheet" href="../assets/css/tailwind.css" />

  </head>
  <body class="auth-page m-0 font-sans text-base leading-relaxed tracking-normal text-secondary-700 antialiased">
    <div class="auth-grid">
      <section class="auth-hero" style="background-image: url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=1200&q=80');">
        <div class="auth-hero-content">
          <a href="../templates/home.html" class="auth-brand">ITMATCH</a>
          <div class="max-w-md space-y-6">
            <h1 class="auth-hero-title">See You Soon</h1>
            <p class="auth-hero-copy">
              You are about to sign out of your account. You can log back in at any time.
            </p>
          </div>
        </div>
      </section>

      <section class="auth-panel">
        <div class="auth-card">
          <div class="auth-form">
            <div>
              <h2 class="auth-title">Sign out</h2>
              <p class="auth-subtitle">This will end your current session on this device.</p>
            </div>

            <div class="auth-form-group">
              <button id="open-signout-modal" type="button" class="ui-btn ui-btn-primary ui-btn-block ui-btn-lg">
                Sign Out
              </button>

              <p class="auth-footnote">
                Changed your mind?
                <a href="./login.html">Back to login</a>
              </p>
            </div>
          </div>
        </div>
      </section>
    </div>

    <div id="signout-modal" class="auth-modal" aria-hidden="true">
      <div class="auth-modal-card">
        <div class="space-y-4">
          <h3 class="auth-modal-title">Confirm sign out</h3>
          <p class="auth-modal-copy">Are you sure you want to sign out now?</p>

          <div class="auth-modal-actions">
            <button id="cancel-signout" type="button" class="ui-btn ui-btn-secondary">Cancel</button>
            <button id="confirm-signout" type="button" class="ui-btn ui-btn-primary">Yes, Sign Out</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="../assets/js/signout.js"></script>
  </body>
</html>
