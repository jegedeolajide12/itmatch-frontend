<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Itmatch - Sign Up</title>
    <link rel="stylesheet" href="../assets/css/tailwind.css" />
    <link rel="stylesheet" href="../assets/css/components.css" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body class="auth-page m-0 font-sans text-base leading-relaxed tracking-normal text-secondary-700 antialiased">
    <div class="auth-grid">
      <section class="auth-hero" style="background-image: url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=1200&q=80');">
        <div class="auth-hero-content">
          <a href="../templates/home.html" class="auth-brand">ITMATCH</a>
          <div class="max-w-md space-y-6">
            <h1 class="auth-hero-title">Find Your Perfect Internship Faster</h1>
            <p class="auth-hero-copy">
              Connect with companies that match your skills and course. No more random applications.
            </p>
          </div>
        </div>
      </section>

      <section class="auth-panel">
        <div class="auth-card">
          <form id="signup-form" class="auth-form" novalidate>
            <div class="auth-form-group">
              <h2 class="auth-title">Create your account</h2>

              <div class="auth-role-switcher">
                <button
                  id="student-role"
                  type="button"
                  data-role="student"
                  aria-pressed="true"
                  class="role-button ui-btn ui-btn-primary auth-role-btn"
                >
                  Student
                </button>
                <button
                  id="company-role"
                  type="button"
                  data-role="company"
                  aria-pressed="false"
                  class="role-button ui-btn ui-btn-secondary auth-role-btn"
                >
                  Company
                </button>
              </div>
            </div>

            <div class="auth-form-group">
              <div class="auth-form-group" id="student-fields">
                <input id="fullName" name="fullName" type="text" placeholder="Full Name" class="ui-input" />
                <input id="email" name="email" type="email" placeholder="Email" class="ui-input" />
                <input id="matricNumber" name="matricNumber" type="text" placeholder="Matric Number" class="ui-input" />

                <select id="school" name="school" class="ui-select">
                  <option value="">School</option>
                  <option value="School of Engineering">School of Engineering</option>
                  <option value="School of Computing">School of Computing</option>
                  <option value="School of Business">School of Business</option>
                  <option value="School of Arts">School of Arts</option>
                </select>

                <select id="course" name="course" class="ui-select">
                  <option value="">Course</option>
                  <option value="Computer Science">Computer Science</option>
                  <option value="Software Engineering">Software Engineering</option>
                  <option value="Information Technology">Information Technology</option>
                  <option value="Business Administration">Business Administration</option>
                </select>

                <div class="relative">
                  <input id="password" name="password" type="password" placeholder="Password" class="ui-input auth-password pr-12" />
                  <button
                    type="button"
                    class="password-toggle ui-icon-btn absolute right-3 top-1/2 -translate-y-1/2"
                    data-target="password"
                    aria-label="Show password"
                    aria-pressed="false"
                  >
                    <svg class="h-5 w-5 eye-icon eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                    <svg class="hidden h-5 w-5 eye-icon eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M3 3l18 18" />
                      <path d="M10.58 10.58A3 3 0 0 0 12 15a3 3 0 0 0 2.42-4.42" />
                      <path d="M9.88 5.08A9.77 9.77 0 0 1 12 5c6.5 0 10 7 10 7a17.7 17.7 0 0 1-3.4 4.37" />
                      <path d="M6.61 6.61C3.76 8.68 2 12 2 12s3.5 7 10 7a9.77 9.77 0 0 0 4.44-1.06" />
                    </svg>
                  </button>
                </div>

                <div class="relative">
                  <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Confirm Password" class="ui-input auth-password pr-12" />
                  <button
                    type="button"
                    class="password-toggle ui-icon-btn absolute right-3 top-1/2 -translate-y-1/2"
                    data-target="confirmPassword"
                    aria-label="Show password"
                    aria-pressed="false"
                  >
                    <svg class="h-5 w-5 eye-icon eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                    <svg class="hidden h-5 w-5 eye-icon eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M3 3l18 18" />
                      <path d="M10.58 10.58A3 3 0 0 0 12 15a3 3 0 0 0 2.42-4.42" />
                      <path d="M9.88 5.08A9.77 9.77 0 0 1 12 5c6.5 0 10 7 10 7a17.7 17.7 0 0 1-3.4 4.37" />
                      <path d="M6.61 6.61C3.76 8.68 2 12 2 12s3.5 7 10 7a9.77 9.77 0 0 0 4.44-1.06" />
                    </svg>
                  </button>
                </div>
              </div>

              <div class="hidden auth-form-group" id="company-fields">
                <input id="companyName" name="companyName" type="text" placeholder="Company Name" class="ui-input" />
                <select id="industry" name="industry" class="ui-select">
                  <option value="">Industry</option>
                  <option value="Technology">Technology</option>
                  <option value="Finance">Finance</option>
                  <option value="Healthcare">Healthcare</option>
                  <option value="Education">Education</option>
                  <option value="Manufacturing">Manufacturing</option>
                </select>
                <input id="companyEmail" name="companyEmail" type="email" placeholder="Email" class="ui-input" />

                <div class="relative">
                  <input id="companyPassword" name="companyPassword" type="password" placeholder="Password" class="ui-input auth-password pr-12" />
                  <button
                    type="button"
                    class="password-toggle ui-icon-btn absolute right-3 top-1/2 -translate-y-1/2"
                    data-target="companyPassword"
                    aria-label="Show password"
                    aria-pressed="false"
                  >
                    <svg class="h-5 w-5 eye-icon eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                    <svg class="hidden h-5 w-5 eye-icon eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M3 3l18 18" />
                      <path d="M10.58 10.58A3 3 0 0 0 12 15a3 3 0 0 0 2.42-4.42" />
                      <path d="M9.88 5.08A9.77 9.77 0 0 1 12 5c6.5 0 10 7 10 7a17.7 17.7 0 0 1-3.4 4.37" />
                      <path d="M6.61 6.61C3.76 8.68 2 12 2 12s3.5 7 10 7a9.77 9.77 0 0 0 4.44-1.06" />
                    </svg>
                  </button>
                </div>

                <div class="relative">
                  <input id="companyConfirmPassword" name="companyConfirmPassword" type="password" placeholder="Confirm Password" class="ui-input auth-password pr-12" />
                  <button
                    type="button"
                    class="password-toggle ui-icon-btn absolute right-3 top-1/2 -translate-y-1/2"
                    data-target="companyConfirmPassword"
                    aria-label="Show password"
                    aria-pressed="false"
                  >
                    <svg class="h-5 w-5 eye-icon eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                    <svg class="hidden h-5 w-5 eye-icon eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M3 3l18 18" />
                      <path d="M10.58 10.58A3 3 0 0 0 12 15a3 3 0 0 0 2.42-4.42" />
                      <path d="M9.88 5.08A9.77 9.77 0 0 1 12 5c6.5 0 10 7 10 7a17.7 17.7 0 0 1-3.4 4.37" />
                      <path d="M6.61 6.61C3.76 8.68 2 12 2 12s3.5 7 10 7a9.77 9.77 0 0 0 4.44-1.06" />
                    </svg>
                  </button>
                </div>
              </div>
            </div>

            <div class="auth-form-group">
              <button id="submit-button" type="submit" disabled class="ui-btn ui-btn-primary ui-btn-block ui-btn-lg">
                Create Account
              </button>

              <div class="auth-form-group">
                <p class="auth-divider">Or sign up with</p>
                <div class="auth-social-grid">
                  <button type="button" class="ui-btn ui-btn-secondary auth-social-btn" aria-label="Sign up with Google">
                    <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M21 12a9 9 0 1 1-2.64-6.36" />
                      <path d="M21 12h-9" />
                    </svg>
                    <span>Google</span>
                  </button>

                  <button type="button" class="ui-btn ui-btn-secondary auth-social-btn" aria-label="Sign up with Facebook">
                    <svg class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                      <path d="M14 8h3V4h-3c-2.8 0-5 2.2-5 5v3H6v4h3v4h4v-4h3l1-4h-4V9c0-.6.4-1 1-1z" />
                    </svg>
                    <span>Facebook</span>
                  </button>

                  <button type="button" class="ui-btn ui-btn-secondary auth-social-btn" aria-label="Sign up with X">
                    <svg class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                      <path d="M4 4h4.3l4 5.7L17.3 4H20l-6.4 7.4L20.4 20h-4.3l-4.3-6.1L6.5 20H4l6.8-7.8L4 4z" />
                    </svg>
                    <span>X</span>
                  </button>
                </div>
              </div>

              <p class="auth-footnote">
                Already have an account?
                <a href="./login.html">Log in</a>
              </p>
            </div>
          </form>
        </div>
      </section>
    </div>

    <script type="module" src="../assets/js/signup.js"></script>
  </body>
</html>
